# Dashboard Menu Bundle – reference configuration.
# Menus and items are stored in the database (created via dashboard or fixtures).
# Per-menu options (name, context, CSS classes, etc.) are set when creating/editing each menu in the dashboard, not here.
# Uncomment and adjust only what you need.

nowo_dashboard_menu:
    # Doctrine DBAL connection and table prefix for menu entities.
    # doctrine:
    #     connection: default
    #     table_prefix: ''

    # Optional project id when multiple apps share the same DB.
    # project: null

    # Locales for menu item labels (i18n). If set, request locale is used only when in this list.
    # locales: []
    # locales: ['en', 'es', 'fr']

    # Fallback locale when request locale is not in locales. If null, first of locales is used.
    # default_locale: null
    # default_locale: 'en'

    # Map full icon library names to short prefixes when rendering the menu (e.g. for Symfony UX Icons).
    # icon_library_prefix_map:
    #     bootstrap-icons: bi

    # Cache for the menu tree (avoids N+1 and repeated DB). TTL in seconds (min 60). Set pool to null to disable.
    # cache:
    #     ttl: 60
    #     pool: cache.app

    # Services shown in the dashboard "Permission checker" dropdown when creating/editing a Menu.
    # Each must implement MenuPermissionCheckerInterface (canView(MenuItem, $context)).
    # Tagged services (nowo_dashboard_menu.permission_checker) are included automatically; this list
    # adds or orders them.
    # permission_checker_choices:
    #     order:
    #         - Nowo\DashboardMenuBundle\Service\AllowAllMenuPermissionChecker
    #         - App\Service\Your\OperatorMenuPermissionChecker
    #     labels:
    #         Nowo\DashboardMenuBundle\Service\AllowAllMenuPermissionChecker: 'Allow all'
    #         App\Service\Your\OperatorMenuPermissionChecker: 'Operator checker'
    # Also accepted shorthand:
    # permission_checker_choices:
    #     - Nowo\DashboardMenuBundle\Service\AllowAllMenuPermissionChecker
    #     - App\Service\Your\OperatorMenuPermissionChecker
    # Or map shorthand (service_id => label):
    # permission_checker_choices:
    #     Nowo\DashboardMenuBundle\Service\AllowAllMenuPermissionChecker: 'Allow all'
    #     App\Service\Your\OperatorMenuPermissionChecker: 'Operator checker'

    api:
        enabled: true
        path_prefix: /api/menu

    dashboard:
        enabled: false
        # Layout that dashboard views extend. Must define block "content". Default: @NowoDashboardMenuBundle/dashboard/layout.html.twig
        # layout_template: '@NowoDashboardMenuBundle/dashboard/layout.html.twig'
        # layout_template: 'base.html.twig'   # e.g. use your app base

        # URL prefix is set in config/routes_nowo_dashboard_menu.yaml (import it from config/routes.yaml).
        # Deprecated (kept for backward compatibility):
        # path_prefix: '/admin/menus'

        # Patterns to hide routes from the "Route" selector when editing menu items.
        # Examples of excluded route names:
        # - `_profiler`, `_wdt`, `_error` (matches `^_`)
        # - `web_profiler_main`, `web_profiler_index` (matches `^web_profiler`)
        # Example of a kept route name:
        # - `app_home` (does not match the patterns)
        # route_name_exclude_patterns: []
        # route_name_exclude_patterns: ['^_', '^web_profiler']  # raw snippets (delimiters optional)
        # route_name_exclude_patterns: ['#^_#', '/^web_profiler/']  # PCRE with delimiters
        route_name_exclude_patterns: 
            - '^_'
            - '^web_profiler'

        # Pagination for the menus list in the dashboard.
        pagination:
            enabled: true
            per_page: 20

        # Modal sizes: normal (default), lg, or xl (Bootstrap 5). Affects new/edit menu, copy menu, add/edit item, delete confirm.
        # modals:
        #     menu_form: normal
        #     copy: normal
        #     item_form: lg
        #     delete: normal

        # Optional URL of icon-selector script asset (Stimulus/UX).
        # icon_selector_script_url: null
        # icon_selector_script_url: 'bundles/nowoiconselector/icon-selector.js'

        # Optional URL of a script that loads Stimulus + Live and exposes window.Stimulus.
        # stimulus_script_url: null
        # stimulus_script_url: 'bundles/nowodashboardmenu/js/stimulus-live.js'

        # Maximum JSON import file size in bytes (default 2 MiB).
        # import_max_bytes: 2097152

        # Require this Symfony role for all dashboard routes (e.g. ROLE_ADMIN). Null = use app access_control.
        # required_role: null
        # required_role: ROLE_ADMIN

        # Optional rate-limit for import/export actions.
        # import_export_rate_limit:
        #     enabled: true
        #     limit: 10
        #     interval: 60
        # import_export_rate_limit: false

        # Selector options for "permission key" in item form. Empty => free text input.
        # permission_key_choices: []
        # permission_key_choices: ['authenticated', 'admin', 'path:/']

        id_options:
            - 'main-menu-navigation'
        # id_options: []

        # CSS size used to render menu item icons (SVG width/height and legacy icon font-size).
        # Example: '1em', '16px', '1.2em'.
        # icon_size: '1em'

        # Wrap non-section item label in an additional <span> in frontend render.
        item_span_active: false

        # CSS class options: choices shown as dropdowns when editing a menu. Override to customize.
        # css_class_options:
        #     menu: ['nav flex-column', 'nav flex-row', 'dropdown-menu dropdown-menu-end', 'nav flex-wrap gap-1']
        #     item: ['nav-item', 'dropdown-item', '']
        #     link: ['nav-link', 'dropdown-item', 'nav-link link-secondary']
        #     children: ['nav flex-column ms-2', 'nav flex-column', 'dropdown-menu']
        #     section_label: ['menu-section-label', '']
        #     section: ['menu-section', 'navigation-header', ''] # <li> class when itemType=section
        #     divider: ['menu-divider', ''] # <li> class when itemType=divider
        #     span: ['ms-2 d-flex align-items-center flex-nowrap'] # wrapper <span> label for non-section items
        #     current: ['active', '']
        #     branch_expanded: ['active-branch', 'active-branch-has-children', '']
        #     has_children: ['dropdown', 'has-children', '']
        #     expanded: ['expanded', '']
        #     collapsed: ['collapsed', '']
