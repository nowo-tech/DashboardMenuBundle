name: dashboard-menu-bundle-demo-symfony-7

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-menu-demo-symfony7-php
    working_dir: /app
    ports:
      - "${PORT:-8010}:80"
    volumes:
      - .:/app
      - ../..:/var/dashboard-menu-bundle
      - ./docker/frankenphp/Caddyfile.dev:/etc/frankenphp/Caddyfile.dev
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=dev
      - APP_DEBUG=1
      - APP_SECRET=${APP_SECRET:-demo-secret}
      - DATABASE_URL=mysql://${MYSQL_USER:-demo_user}:${MYSQL_PASSWORD:-password}@mysql:3306/${MYSQL_DATABASE:-dashboard_menu_demo}?serverVersion=8.0&charset=utf8mb4
    # Mitigate Docker/WSL DNS failures resolving repo.packagist.org (composer curl error 6).
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - demo-network

  mysql:
    image: mysql:8.0
    container_name: dashboard-menu-demo-symfony7-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dashboard_menu_demo}
      MYSQL_USER: ${MYSQL_USER:-demo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    volumes:
      - ./.data/mysql:/var/lib/mysql
    # DB reachable only inside the Docker network (hostname `mysql`).
    expose:
      - "3306"
    networks:
      - demo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-password}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  composer-cache:
    driver: local

networks:
  demo-network:
    name: dashboard-menu-demo-symfony7-network
    driver: bridge
