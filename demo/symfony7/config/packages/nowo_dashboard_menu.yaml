# Only these keys can be set in YAML: project, locales, default_locale, doctrine, icon_library_prefix_map, api, dashboard, permission_checker_choices.
# Menus are registered and configured only in the database (dashboard or fixtures).
nowo_dashboard_menu:
    doctrine:
        connection: default
        table_prefix: ''
    project: demo_app
    locales: ['en', 'es', 'fr']
    default_locale: 'en'
    # Services shown in the dashboard "Permission checker" dropdown when creating/editing a Menu.
    # Each must implement MenuPermissionCheckerInterface (canView(MenuItem, $context)). Tagged
    # services (nowo_dashboard_menu.permission_checker) are included automatically; this list adds
    # or orders them. Optional: use a map for custom labels, e.g. "FQCN: 'Display label'".
    permission_checker_choices:
        - Nowo\DashboardMenuBundle\Service\AllowAllMenuPermissionChecker   # Allow all items (no filter)
        - Nowo\DashboardMenuBundle\Service\PermissionKeyAwareMenuPermissionChecker   # By permission key (structure)
        - App\Service\DemoMenuPermissionChecker                            # By user/role and path (authenticated, admin, path:/…)

    icon_library_prefix_map:
        'bootstrap-icons': bi

    cache:
        ttl: 60
        pool: cache.app

    dashboard:
        enabled: true
        # Layout that dashboard views extend. Must define block "content". Omit to use the bundle default.
        layout_template: '@NowoDashboardMenuBundle/dashboard/layout.html.twig'
        # layout_template: 'base.html.twig'   # e.g. use your app base and override in templates/bundles/.../layout.html.twig
        # URL prefix is set in config/routes.yaml (nowo_dashboard_menu_dashboard.prefix).
        # URL or asset path for the icon-selector script (Stimulus/UX). Enables the icon field in the item form modal.
        icon_selector_script_url: 'bundles/nowoiconselector/icon-selector.js'
        # Stimulus for Live form: use the bundle's script so window.Stimulus is always available when opening the item modal. Set to null only if your layout loads Stimulus (e.g. Vite) and exposes window.Stimulus before the modal is used.
        stimulus_script_url: 'bundles/nowodashboardmenu/js/stimulus-live.js'
        # route_name_exclude_patterns: ['^_', '^web_profiler']  # regex: hide internal/profiler routes from selector
        pagination:
            enabled: true
            per_page: 20
        # Modal sizes: normal, lg, or xl (Bootstrap 5). Affects new/edit menu, copy menu, add/edit item, delete confirm.
        modals:
            menu_form: lg
            copy: normal
            item_form: lg
            delete: normal
        # CSS class options: when set, the menu form shows dropdowns instead of free text for each slot
        css_class_options:
            menu: ['nav flex-column', 'nav flex-row', 'dropdown-menu dropdown-menu-end', 'nav flex-wrap gap-2']
            item: ['nav-item', 'dropdown-item', '']
            link: ['nav-link', 'dropdown-item', 'nav-link link-secondary']
            children: ['nav flex-column ms-2', 'nav flex-column', 'dropdown-menu']
            section_label: ['menu-section-label', 'navigation-header', '']
            current: ['active', '']
            branch_expanded: ['active-branch', 'active-branch-has-children', '']
            has_children: ['dropdown', 'has-children', '']
            expanded: ['expanded', '']
            collapsed: ['collapsed', '']
    api:
        enabled: true
        path_prefix: /api/menu
