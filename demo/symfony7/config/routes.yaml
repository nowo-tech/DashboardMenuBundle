# App routes: /{_locale} prefix defined on each controller
controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute

nowo_dashboard_menu:
    resource: '@NowoDashboardMenuBundle/Resources/config/routes.yaml'

nowo_dashboard_menu_dashboard:
    resource: '@NowoDashboardMenuBundle/Resources/config/routes_dashboard.yaml'
    prefix: /admin/menus

# Icon Selector Bundle - API for icon list (/api/icon-selector/icons)
nowo_icon_selector:
    resource: '@NowoIconSelectorBundle/Resources/config/routes.yaml'

# Optional: when symfony/ux-live-component is installed, copy routes/ux_live_component.yaml.example
# to routes/ux_live_component.yaml and uncomment the block below (dashboard item form modal).
# _ux_live_component:
#     resource: routes/ux_live_component.yaml

# Dev/test: Web Profiler & Debug toolbar
_web_profiler:
    resource: routes/web_profiler.yaml
