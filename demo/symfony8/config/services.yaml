parameters:
    # Avoid "Attempted to load interface NodeVisitor from namespace PhpParser" when
    # the container is built (e.g. cache:clear) and a dependency triggers PhpParser autoload.
    container.dumper.inline_class_loader: false

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\EventSubscriber\LocaleSubscriber:
        arguments:
            $allowedLocales: '%nowo_dashboard_menu.locales%'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\DataFixtures\:
        resource: '../src/DataFixtures/'

    App\Service\:
        resource: '../src/Service/'

    App\Service\DemoMenuPermissionChecker:
        tags:
            - { name: nowo_dashboard_menu.permission_checker, label: 'Demo (user, path, permission key)' }

    App\Service\CustomDemoPermissionChecker:
        tags:
            - { name: nowo_dashboard_menu.permission_checker, label: 'Custom demo checker (with DENY)' }

    App\Service\DemoMenuLinkResolver:
        tags:
            - { name: nowo_dashboard_menu.menu_link_resolver, label: 'Demo (Info section from route params JSON)' }
