parameters:
    # Avoid "Attempted to load interface NodeVisitor from namespace PhpParser" when
    # the container is built (e.g. cache:clear) and a dependency triggers PhpParser autoload.
    container.dumper.inline_class_loader: false

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\EventSubscriber\LocaleSubscriber:
        arguments:
            $allowedLocales: '%nowo_dashboard_menu.locales%'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\DataFixtures\:
        resource: '../src/DataFixtures/'

    App\Service\:
        resource: '../src/Service/'
        # DemoMenuPermissionChecker (and any class implementing MenuPermissionCheckerInterface)
        # is auto-tagged by the bundle; label from DASHBOARD_LABEL or #[PermissionCheckerLabel].
