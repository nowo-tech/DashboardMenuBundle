doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        server_version: '8.0'
    orm:
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
            NowoDashboardMenuBundle:
                is_bundle: true
                type: attribute
                dir: Entity
                prefix: 'Nowo\DashboardMenuBundle\Entity'
                alias: NowoDashboardMenuBundle
