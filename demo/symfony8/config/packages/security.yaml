security:
    password_hashers:
        Symfony\Component\PasswordHasher\Hasher\UserPasswordHasherInterface: 'auto'
    providers:
        users_in_memory: { memory: null }
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: users_in_memory
