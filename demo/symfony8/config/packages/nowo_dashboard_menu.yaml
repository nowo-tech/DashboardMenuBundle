# Full configuration keys available in YAML:
# project, doctrine, cache, icon_library_prefix_map, locales, default_locale,
# permission_checker_choices, api, dashboard.
# Menus are registered and configured only in the database (dashboard or fixtures).
nowo_dashboard_menu:
    doctrine:
        connection: default
        table_prefix: ''
    project: demo_app
    locales: ['en', 'es', 'fr']
    default_locale: 'en'
    # Services shown in the dashboard "Permission checker" dropdown when creating/editing a Menu.
    # Each must implement MenuPermissionCheckerInterface (canView(MenuItem, $context)). Tagged
    # services (nowo_dashboard_menu.permission_checker) are included automatically; this list adds
    # or orders them. Optional: use a map for custom labels, e.g. "FQCN: 'Display label'".
    permission_checker_choices:
        order:
            - Nowo\DashboardMenuBundle\Service\AllowAllMenuPermissionChecker
            - Nowo\DashboardMenuBundle\Service\PermissionKeyAwareMenuPermissionChecker
            - App\Service\DemoMenuPermissionChecker
        labels:
            Nowo\DashboardMenuBundle\Service\AllowAllMenuPermissionChecker: 'Allow all items'
            Nowo\DashboardMenuBundle\Service\PermissionKeyAwareMenuPermissionChecker: 'By permission key'
            App\Service\DemoMenuPermissionChecker: 'By user/role and path'

    icon_library_prefix_map:
        'bootstrap-icons': bi

    cache:
        ttl: 60
        pool: cache.app

    dashboard:
        enabled: true
        # Layout that dashboard views extend. Must define block "nowo_dashboard_menu_content".
        # Override in templates/bundles/NowoDashboardMenuBundle/dashboard/layout.html.twig to inject your app's CSS/JS (e.g. Vite).
        layout_template: '@NowoDashboardMenuBundle/dashboard/layout.html.twig'
        # Deprecated: configure route import prefix in config/routes.yaml instead.
        # path_prefix: '/admin/menus'
        # URL or asset path for the icon-selector script (Stimulus/UX). Enables the icon field in the item form modal.
        icon_selector_script_url: 'bundles/nowoiconselector/icon-selector.js'
        # Stimulus for Live form: use the bundle's script so window.Stimulus is always available when opening the item modal. Set to null only if your layout loads Stimulus (e.g. Vite) and exposes window.Stimulus before the modal is used.
        stimulus_script_url: 'bundles/nowodashboardmenu/js/stimulus-live.js'
        # route selector: hide Symfony internal/profiler routes from the "Route" field in item forms.
        # Excludes (examples): `_profiler`, `_wdt`, `web_profiler_main`, `web_profiler_index`.
        # Keeps (examples): `app_home`, and bundle routes like `nowo_dashboard_menu_dashboard_index`.
        route_name_exclude_patterns:
            - '^_'
            - '^web_profiler'

        pagination:
            enabled: true
            per_page: 20
        # Permission keys offered in the item form selector (same as in MenuFixtures: authenticated, admin, path:/).
        permission_key_choices: ['authenticated', 'admin', 'path:/']
        # Modal sizes: normal, lg, or xl (Bootstrap 5). Affects new/edit menu, copy menu, add/edit item, delete confirm.
        modals:
            menu_form: lg
            copy: normal
            item_form: lg
            delete: normal
        # Maximum JSON import size in bytes (default 2 MiB).
        import_max_bytes: 2097152
        # Require role for dashboard routes (null to rely on app access_control).
        # required_role: null
        # required_role: ROLE_ADMIN
        # Optional rate limit for import/export operations.
        # import_export_rate_limit:
        #     enabled: true
        #     limit: 10
        #     interval: 60
        # import_export_rate_limit: false
        id_options:
            - 'main-menu-navigation'
        # CSS size used to render menu item icons (SVG width/height and legacy icon font-size).
        icon_size: '1em'
        item_span_active: false
        # CSS class options: when set, the menu form shows dropdowns instead of free text for each slot
        css_class_options:
            menu: ['nav flex-column', 'nav flex-row', 'dropdown-menu dropdown-menu-end', 'nav flex-wrap gap-1']
            item: ['nav-item', 'dropdown-item', '']
            link: ['nav-link', 'dropdown-item', 'nav-link link-secondary']
            children: ['nav flex-column ms-2', 'nav flex-column', 'dropdown-menu']
            section_label: ['menu-section-label', 'navigation-header', '']
            section: ['menu-section', 'navigation-header', '']
            divider: ['menu-divider', '']
            span: ['ms-2 d-flex align-items-center flex-nowrap']
            current: ['active', '']
            branch_expanded: ['active-branch', 'active-branch-has-children', '']
            has_children: ['dropdown', 'has-children', '']
            expanded: ['expanded', '']
            collapsed: ['collapsed', '']
    api:
        enabled: true
        path_prefix: /api/menu
