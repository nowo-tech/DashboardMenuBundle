services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Nowo\DashboardMenuBundle\Repository\MenuRepository:
    public: true

  Nowo\DashboardMenuBundle\Repository\MenuItemRepository:
    public: true

  Nowo\DashboardMenuBundle\Form\MenuItemType: ~

  Nowo\DashboardMenuBundle\Form\MenuItemBasicType:
    arguments:
      $availableLocales: '%nowo_dashboard_menu.locales%'

  Nowo\DashboardMenuBundle\Form\MenuItemIconType:
    arguments:
      $menuIconNameResolver: '@Nowo\DashboardMenuBundle\Service\MenuIconNameResolver'
      $translator: '@translator'

  Nowo\DashboardMenuBundle\Form\MenuItemConfigType:
    arguments:
      $menuItemRepository: '@Nowo\DashboardMenuBundle\Repository\MenuItemRepository'
      $permissionKeyChoices: '%nowo_dashboard_menu.dashboard.permission_key_choices%'
      $menuLinkResolverChoices: '%nowo_dashboard_menu.menu_link_resolver_choices%'
      $defaultLocale: '%nowo_dashboard_menu.default_locale_resolved%'
      $translator: '@translator'

  Nowo\DashboardMenuBundle\Form\CopyMenuType:
    arguments:
      $translator: '@translator'

  Nowo\DashboardMenuBundle\Form\ImportMenuType:
    arguments:
      $translator: '@translator'

  Nowo\DashboardMenuBundle\Form\MenuType: ~

  Nowo\DashboardMenuBundle\Form\MenuDefinitionType:
    arguments:
      $translator: '@translator'

  Nowo\DashboardMenuBundle\Form\MenuConfigType:
    arguments:
      $permissionCheckerChoices: '%nowo_dashboard_menu.permission_checker_choices%'
      $cssClassOptions: '%nowo_dashboard_menu.dashboard.css_class_options%'
      $ulIdOptions: '%nowo_dashboard_menu.dashboard.id_options%'
      $translator: '@translator'

  Nowo\DashboardMenuBundle\Service\AllowAllMenuPermissionChecker:
    tags:
      - { name: nowo_dashboard_menu.permission_checker, label: 'form.menu_type.permission_checker.allow_all' }
    public: false

  Nowo\DashboardMenuBundle\Service\PermissionKeyAwareMenuPermissionChecker:
    tags:
      - { name: nowo_dashboard_menu.permission_checker, label: 'form.menu_type.permission_checker.permission_key_aware' }
    public: false

  Nowo\DashboardMenuBundle\Service\MenuTreeLoader:
    arguments:
      $permissionCheckerLocator: !tagged_locator { tag: 'nowo_dashboard_menu.permission_checker' }
      $linkResolverContainer: !tagged_locator { tag: 'nowo_dashboard_menu.menu_link_resolver' }
      $menuLinkResolverChoices: '%nowo_dashboard_menu.menu_link_resolver_choices%'
      $requestStack: '@request_stack'
      $permissionCheckerChoices: '%nowo_dashboard_menu.permission_checker_choices%'
      $menuIconNameResolver: '@Nowo\DashboardMenuBundle\Service\MenuIconNameResolver'
      $cachePool: null
      $cacheTtl: 60
    public: true

  Nowo\DashboardMenuBundle\Service\MenuUrlResolver:
    arguments:
      $container: !tagged_locator { tag: 'nowo_dashboard_menu.menu_link_resolver' }
      $menuLinkResolverChoices: '%nowo_dashboard_menu.menu_link_resolver_choices%'
    public: true

  Nowo\DashboardMenuBundle\Service\CurrentRouteTreeDecorator:
    class: Nowo\DashboardMenuBundle\Service\CurrentRouteTreeDecorator
    public: false

  Nowo\DashboardMenuBundle\Twig\MenuExtension:
    arguments:
      $dataCollector: null
      $menuIconNameResolver: '@Nowo\DashboardMenuBundle\Service\MenuIconNameResolver'
      $dashboardLayoutTemplate: '%nowo_dashboard_menu.dashboard.layout_template%'
      $uxAutocompleteAvailable: '%nowo_dashboard_menu.ux_autocomplete_available%'
      $iconSize: '%nowo_dashboard_menu.dashboard.icon_size%'
      $itemSpanActive: '%nowo_dashboard_menu.dashboard.item_span_active%'
      $itemSpanClass: '%nowo_dashboard_menu.dashboard.item_span_class%'
    tags:
      - { name: twig.extension }
    public: false

  Nowo\DashboardMenuBundle\Controller\Api\MenuApiController:
    public: true

  Nowo\DashboardMenuBundle\Service\MenuExporter: ~
  Nowo\DashboardMenuBundle\Service\MenuImporter: ~

  # ItemFormLiveComponent is registered in services_live_component.yaml when symfony/ux-live-component is installed

  Nowo\DashboardMenuBundle\Controller\Dashboard\MenuDashboardController:
    arguments:
      $menuExporter: '@Nowo\DashboardMenuBundle\Service\MenuExporter'
      $menuImporter: '@Nowo\DashboardMenuBundle\Service\MenuImporter'
      $routeNameExcludePatterns: '%nowo_dashboard_menu.dashboard.route_name_exclude_patterns%'
      $locales: '%nowo_dashboard_menu.locales%'
      $paginationEnabled: '%nowo_dashboard_menu.dashboard.pagination.enabled%'
      $paginationPerPage: '%nowo_dashboard_menu.dashboard.pagination.per_page%'
      $modalSizes: '%nowo_dashboard_menu.dashboard.modals%'
      $iconSelectorScriptUrl: '%nowo_dashboard_menu.dashboard.icon_selector_script_url%'
      $stimulusScriptUrl: '%nowo_dashboard_menu.dashboard.stimulus_script_url%'
      $importMaxBytes: '%nowo_dashboard_menu.dashboard.import_max_bytes%'
      $positionStep: '%nowo_dashboard_menu.dashboard.position_step%'
      $importExportRateLimiter: '@Nowo\DashboardMenuBundle\Service\ImportExportRateLimiter'
      $itemFormLiveComponentEnabled: '%nowo_dashboard_menu.dashboard.item_form_live_component_enabled%'
    public: true

  Nowo\DashboardMenuBundle\EventSubscriber\TablePrefixSubscriber:
    arguments:
      $tablePrefix: '%nowo_dashboard_menu.table_prefix%'
    tags:
      - { name: doctrine.event_subscriber }

  Nowo\DashboardMenuBundle\Command\GenerateDashboardMenuMigrationCommand:
    arguments:
      $connectionName: '%nowo_dashboard_menu.doctrine.connection%'
      $tablePrefix: '%nowo_dashboard_menu.table_prefix%'
    tags:
      - { name: console.command }

  Nowo\DashboardMenuBundle\Command\GoogleSyncTranslationsCommand:
    tags:
      - { name: console.command }
