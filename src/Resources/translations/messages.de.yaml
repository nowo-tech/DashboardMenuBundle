    label_locale: "Bezeichnung (%locale%)"
    type:
      label: Typ
      link: Link
      section: Abschnitt
      divider: Trennlinie
    position:
      label: Position
    link_type:
      label: Linktyp
      route: Route
      external_url: Externe URL
    route_name:
      label: Routenname
      placeholder: "— Route wählen —"
    route_params:
      label: "Routenparameter (JSON)"
      placeholder: "{}"
    external_url:
      label: Externe URL
      placeholder: "https://..."
    target_blank:
      label: In neuem Tab öffnen
    permission_key:
      label: Berechtigungsschlüssel
    icon:
      label: Icon
      placeholder: "heroicons:home"
    parent:
