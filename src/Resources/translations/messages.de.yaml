form:
  menu_type:
    code:
      label: Code
      help: "Eindeutige Kennung (Buchstaben, Zahlen, _ -). Bei Basis-Menüs kann der Code nach der Erstellung nicht geändert werden."
      placeholder: "z. B. sidebar"
    base:
      label: "Basis-Menü"
      help: "Wenn aktiviert, kann der Code dieses Menüs nach der Erstellung nicht geändert werden."
    name:
      label: Name
      placeholder: "z. B. Sidebar"
    context:
      label: Kontext
      help: "Optionale JSON-Schlüssel-Wert-Paare zur Identifikation dieser Menüvariante."
      placeholder: '{"partnerId": 1, "operatorId": 1}'
    icon:
      label: Icon
      help: "Optionale Icon-Kennung (z. B. Symfony UX Icons: heroicons:home, bootstrap:house)."
      placeholder: "z. B. heroicons:bars-3"
    permission_checker:
      label: Berechtigungsprüfung
      placeholder: "— Alle erlauben —"
      allow_all: "— Alle erlauben —"
      help: "Service, der MenuPermissionCheckerInterface implementiert (leer = alle erlauben)."
    depth_limit:
      label: Tiefenlimit
      placeholder: "leer = unbegrenzt"
      help: "Maximale Tiefe (1 = nur Wurzel; leer = unbegrenzt)."
    collapsible:
      label: "Einklappbar (Menü in ein-/ausblendbarem Block)"
    collapsible_expanded:
      label: "Einklappbar geöffnet (standardmäßig offen)"
    nested_collapsible:
      label: "Verschachtelt einklappbar"
    class_menu:
      label: "Klasse Menü (Stamm-<ul>)"
      placeholder: "z. B. nav flex-column"
    class_item:
      label: "Klasse Eintrag (<li>)"
      placeholder: "z. B. nav-item"
    class_link:
      label: "Klasse Link (<a>)"
      placeholder: "z. B. nav-link"
    class_children:
      label: "Klasse Kinder (verschachteltes <ul>)"
      placeholder: "z. B. nav flex-column ms-2"
    class_current:
      label: "Klasse aktuell (Link zur aktuellen Route)"
      placeholder: "z. B. active"
    class_branch_expanded:
      label: "Klasse Zweig ausgeklappt"
      placeholder: "z. B. active-branch"
    class_has_children:
      label: "Klasse hat Kinder"
      placeholder: "z. B. has-children"
    class_expanded:
      label: "Klasse ausgeklappt"
      placeholder: "z. B. is-expanded"
    class_collapsed:
      label: "Klasse eingeklappt"
      placeholder: "z. B. is-collapsed"
    empty_choice: "— Leer —"
    css_section_heading: "CSS-Klassen für die Ausgabe."
