# Form: MenuType
form:
  menu_type:
    code:
      label: Code
      help: "Eindeutige Kennung (Buchstaben, Zahlen, _ -). Bei Basis-Menüs kann der Code nach der Erstellung nicht geändert werden."
      placeholder: "z. B. sidebar"
    base:
      label: "Basis-Menü"
      help: "Wenn aktiviert, kann der Code dieses Menüs nach der Erstellung nicht geändert werden."
    name:
      label: Name
      placeholder: "z. B. Sidebar"
    context:
      label: Kontext
      help: "Optionale JSON-Schlüssel-Wert-Paare zur Identifikation dieser Menüvariante. Bei Auflösung nach Code wird das erste passende Menü in der geordneten Kontextliste verwendet; leer = Fallback für diesen Code."
      placeholder: '{"partnerId": 1, "operatorId": 1}'
    icon:
      label: Icon
      help: "Optionale Icon-Kennung (z. B. Symfony UX Icons: heroicons:home, bootstrap:house)."
      placeholder: "z. B. heroicons:bars-3, bootstrap:list"
    permission_checker:
      label: Berechtigungsprüfung
      placeholder: "— Alle erlauben —"
      allow_all: "— Alle erlauben —"
      permission_key_aware: "— Nach Berechtigungsschlüssel (Struktur) —"
      help: "Service, der MenuPermissionCheckerInterface implementiert (leer = alle erlauben)."
    depth_limit:
      label: Tiefenlimit
      placeholder: "leer = unbegrenzt"
      help: "Maximale Tiefe zum Rendern (1 = nur Wurzel, 2 = Wurzel + eine Ebene; leer = unbegrenzt)."
    collapsible:
      label: "Einklappbar (Menü in ein-/ausblendbarem Block)"
    collapsible_expanded:
      label: "Einklappbar erweitert (standardmäßig offen)"
    nested_collapsible:
      label: "Verschachtelt einklappbar (Einträge mit Kindern haben Umschalter)"
    nested_collapsible_sections:
      label: "Einklappbare Abschnitte"
      help: "Erfordert verschachtelt einklappbar. Wenn aktiviert, zeigen Abschnittszeilen ein Chevron rechts und ihre Links können eingeklappt werden. Wenn deaktiviert, bleiben Abschnitts-Kinder immer ausgeklappt (ohne Chevron)."
    class_menu:
      label: "Klasse Menü (Stamm-<ul>)"
      placeholder: "z. B. nav flex-column"
    ul_id:
      label: "Ul-ID (Stamm-<ul>)"
      placeholder: "z. B. main-menu-navigation"
    class_item:
      label: "Klasse Eintrag (<li>)"
      placeholder: "z. B. nav-item"
    class_link:
      label: "Klasse Link (<a>)"
      placeholder: "z. B. nav-link"
    class_children:
      label: "Klasse Kinder (verschachteltes <ul>)"
      placeholder: "z. B. nav flex-column ms-2"
    class_section_children:
      label: "Klasse Abschnitts-Kinder (<ul> unter itemType „section“)"
      placeholder: "z. B. nav flex-column list-unstyled ps-0 (flach; leer = wie Kinder)"
      help: "Wenn gesetzt, verwendet die erste Ebene unter jedem Abschnitt diese Klassen statt „Klasse Kinder“, damit Links mit dem Abschnittstitel ausgerichtet werden (ohne Einrückung). Leer lassen, um die verschachtelte Kinder-Klasse zu verwenden."
    class_section_child_item:
      label: "Klasse <li> für direkte Kinder von itemType „section“"
      placeholder: "z. B. nav-item ms-0 (leer = wie Klasse Eintrag)"
      help: "Wenn gesetzt, verwenden Links und Trenner, die direkte Kinder eines Abschnitts sind, diese Klasse für <li> statt „Klasse Eintrag“. Für Abstands-/Padding-Anpassungen unter flachen Abschnittslisten."
    class_section_child_link:
      label: "Klasse <a> für direkte Kinder von itemType „section“"
      placeholder: "z. B. d-flex align-items-center ps-0 (leer = wie Klasse Link)"
      help: "Wenn gesetzt, verwenden Links, die direkte Kinder eines Abschnitts sind, diese Klasse für <a> statt „Klasse Link“. Ergänzt die Abschnitts-Kinder-<li>-Klasse zur Ausrichtung."
    class_section_label:
      label: "Klasse Abschnittsbezeichnung (itemType „section“)"
      placeholder: "z. B. navigation-header"
    class_section:
      label: "Klasse Abschnitt (<li> wenn itemType „section“)"
      placeholder: "z. B. menu-section"
    class_divider:
      label: "Klasse Trenner (<li> wenn itemType „divider“)"
      placeholder: "z. B. menu-divider"
    class_current:
      label: "Klasse aktuell (Link zur aktuellen Route)"
      placeholder: "z. B. active"
    class_branch_expanded:
      label: "Klasse Zweig ausgeklappt (<li> wenn Route im Zweig)"
      placeholder: "z. B. active-branch"
    class_has_children:
      label: "Klasse hat Kinder (<li> wenn Eintrag Kinder hat)"
      placeholder: "z. B. has-children"
    class_expanded:
      label: "Klasse ausgeklappt (<li> wenn Kinderblock offen)"
      placeholder: "z. B. is-expanded"
    class_collapsed:
      label: "Klasse eingeklappt (<li> wenn Kinderblock geschlossen)"
      placeholder: "z. B. is-collapsed"
    empty_choice: "— Leer —"
    css_section_heading: "CSS-Klassen für die Ausgabe (überschreiben die Konfiguration, wenn gesetzt)."
    section_definition: "Definition (Code, Basis, Name, Kontext, Icon)"
    section_config: "Konfiguration (Berechtigungen, Tiefe, einklappbar, CSS)"

  menu_item_type:
    section_basic: "Identität (Bezeichnungen)"
    section_icon: "Identität (Typ, Position, Icon)"
    section_config: "Konfiguration (Link, Berechtigung)"
    label_required: "Bezeichnung ist für Link und Abschnitt erforderlich."
    label:
      label: Bezeichnung
    label_locale: "Bezeichnung (%locale%)"
    divider_label_hint: "Optionaler Name für diesen Trenner (empfohlen für Barrierefreiheit und die Dashboard-Liste). Leer lassen, wenn nur ein visueller Separator benötigt wird."
    type:
      label: Typ
      link: Link
      section: Abschnitt
      divider: Trennlinie
      service: Service (Laufzeit-URL)
    link_resolver:
      label: Link-Auflöser
      placeholder: "— Auflöser wählen —"
      help: "Wählen Sie einen Service, der MenuLinkResolverInterface implementiert. Er kann eine einzelne URL oder eine Liste von untergeordneten Link-Zeilen (label, href, position) zurückgeben; der übergeordnete href ist dann „#“."
      service_id_placeholder: "z. B. App\\Menu\\MyLinkResolver"
      help_free_text: "Geben Sie die Service-ID (Klassenname oder Container-ID) ein, die MenuLinkResolverInterface implementiert."
      required: Für den Typ „Service“ ist ein Link-Auflöser erforderlich.
      route_params_hint: "Optionales JSON für den Auflöser (z. B. routenähnliche Parameter)."
    position:
      label: Position
    link_type:
      label: Linktyp
      route: Route
      external_url: Externe URL
    route_name:
      label: Routenname
      placeholder: "— Route wählen —"
    route_params:
      label: "Routenparameter (JSON)"
      placeholder: "{}"
    external_url:
      label: Externe URL
      placeholder: "https://..."
    target_blank:
      label: In neuem Tab öffnen
    permission_keys:
      label: Berechtigungsschlüssel
      placeholder: "— Alle erlauben —"
      help_csv: "Kommagetrennte Schlüssel (wird verwendet, wenn keine konfigurierten Auswahlen verfügbar sind)."
      choice:
        authenticated: "Nur authentifiziert"
        admin: "Nur Admin"
        path__: "Pfad: / (nur Startseite)"
    is_unanimous:
      label: Alle ausgewählten Schlüssel erfordern
      help: "Aktiviert: alle Schlüssel müssen erfüllen (UND). Deaktiviert: ein beliebiger Schlüssel reicht (ODER)."
    icon:
      label: Icon
      placeholder: "heroicons:home"
    parent:
      label: Übergeordnet
      placeholder: "— Wurzel (kein übergeordneter Eintrag) —"
      help_inheritance: "Übergeordnete Einträge stehen im Baum darüber. Berechtigungsschlüssel in dieser Zeile gelten für diesen Eintrag; Ihr MenuPermissionChecker entscheidet, wie Regeln für übergeordnete/untergeordnete Einträge kombiniert werden. Abschnitte und erweiterbare Links werden nur angezeigt, wenn mindestens ein untergeordneter Eintrag sichtbar ist."
      circular_violation: "Zirkuläre übergeordnete Hierarchie ist nicht erlaubt."
      section_must_be_root: "Abschnittseinträge müssen auf Wurzelebene bleiben (kein übergeordneter Eintrag)."
    section_collapsible:
      label: "Untergeordnete Abschnittseinträge einklappbar"
      inherit: "Menüstandard verwenden"
      yes: "Ja (einklappbar mit Chevron)"
      no: "Nein (immer ausgeklappt)"
      help: "Überschreibt die Menüoption „Einklappbare Abschnitte“ nur für diesen Abschnitt. „Menüstandard verwenden“ folgt der Menükonfiguration."

  import_menu_type:
    file:
      label: JSON-Datei
      required: Bitte wählen Sie eine Datei.
      mime_message: Die Datei muss JSON sein.
    strategy:
      label: Wenn ein Menü mit dem gleichen Code und Kontext bereits existiert
      skip_existing: Überspringen (nicht importieren)
      replace: Ersetzen (vorhandene Einträge löschen und importieren)

  copy_menu_type:
    code:
      label: Code
      placeholder: "z. B. sidebar_kopie"
      regex_message: "Der Code darf nur Buchstaben, Zahlen, Unterstrich und Bindestrich enthalten."
    name:
      label: Name
      placeholder: "z. B. Sidebar (Kopie)"
