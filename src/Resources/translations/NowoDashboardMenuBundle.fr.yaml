# Form: MenuType
form:
  menu_type:
    code:
      label: Code
      help: "Identifiant unique (lettres, chiffres, _ -). Pour les menus de base, le code ne peut pas être modifié après la création."
      placeholder: "ex. sidebar"
    base:
      label: "Menu de base"
      help: "Si coché, le code de ce menu ne pourra pas être modifié après la création."
    name:
      label: Nom
      placeholder: "ex. Sidebar"
    context:
      label: Contexte
      help: "Paires clé-valeur JSON optionnelles pour identifier cette variante de menu. Lors de la résolution par code, le premier menu correspondant dans la liste ordonnée des contextes est utilisé ; vide = repli pour ce code."
      placeholder: '{"partnerId": 1, "operatorId": 1}'
    icon:
      label: Icône
      help: "Identifiant d'icône optionnel (ex. Symfony UX Icons : heroicons:home, bootstrap:house)."
      placeholder: "ex. heroicons:bars-3, bootstrap:list"
    permission_checker:
      label: Vérificateur de permissions
      placeholder: "— Tout autoriser —"
      allow_all: "— Tout autoriser —"
      permission_key_aware: "— Par clé de permission (structure) —"
      help: "Service implémentant MenuPermissionCheckerInterface (vide = tout autoriser)."
    depth_limit:
      label: Limite de profondeur
      placeholder: "vide = illimité"
      help: "Profondeur maximale à rendre (1 = racine seule, 2 = racine + un niveau ; vide = illimité)."
    collapsible:
      label: "Repliable (menu dans un bloc avec bascule)"
    collapsible_expanded:
      label: "Repliable étendu (ouvert par défaut)"
    nested_collapsible:
      label: "Repliable imbriqué (les éléments avec enfants ont une bascule)"
    nested_collapsible_sections:
      label: "Sections repliables"
      help: "Nécessite le repliable imbriqué. Si activé, les lignes de section affichent un chevron à droite et leurs liens peuvent être repliés. Si désactivé, les enfants de section restent toujours dépliés (sans chevron)."
    class_menu:
      label: "Classe menu (<ul> racine)"
      placeholder: "ex. nav flex-column"
    ul_id:
      label: "Id ul (racine <ul>)"
      placeholder: "ex. main-menu-navigation"
    class_item:
      label: "Classe élément (<li>)"
      placeholder: "ex. nav-item"
    class_link:
      label: "Classe lien (<a>)"
      placeholder: "ex. nav-link"
    class_children:
      label: "Classe enfants (<ul> imbriqué)"
      placeholder: "ex. nav flex-column ms-2"
    class_section_children:
      label: "Classe enfants de section (<ul> sous itemType \"section\")"
      placeholder: "ex. nav flex-column list-unstyled ps-0 (plat ; vide = comme enfants)"
      help: "Si défini, la liste de premier niveau sous chaque section utilise ces classes au lieu de « Classe enfants », pour aligner les liens avec le titre de section (sans retrait). Laisser vide pour continuer à utiliser la classe enfants imbriqués."
    class_section_child_item:
      label: "Classe <li> pour enfants directs de itemType \"section\""
      placeholder: "ex. nav-item ms-0 (vide = comme Classe élément)"
      help: "Si défini, les liens et séparateurs enfants directs d'une section utilisent cette classe pour <li> au lieu de « Classe élément ». Utile pour les marges/padding sous listes plates de section."
    class_section_child_link:
      label: "Classe <a> pour enfants directs de itemType \"section\""
      placeholder: "ex. d-flex align-items-center ps-0 (vide = comme Classe lien)"
      help: "Si défini, les liens enfants directs d'une section utilisent cette classe pour <a> au lieu de « Classe lien ». S'associe à la classe <li> enfant de section pour l'alignement."
    class_section_label:
      label: "Classe libellé de section (itemType \"section\")"
      placeholder: "ex. navigation-header"
    class_section:
      label: "Classe section (<li> quand itemType \"section\")"
      placeholder: "ex. menu-section"
    class_divider:
      label: "Classe séparateur (<li> quand itemType \"divider\")"
      placeholder: "ex. menu-divider"
    class_current:
      label: "Classe actuel (lien correspondant à la route actuelle)"
      placeholder: "ex. active"
    class_branch_expanded:
      label: "Classe branche ouverte (<li> quand la route est dans la branche)"
      placeholder: "ex. active-branch"
    class_has_children:
      label: "Classe avec enfants (<li> quand l'élément a des enfants)"
      placeholder: "ex. has-children"
    class_expanded:
      label: "Classe ouvert (<li> quand le bloc enfants est ouvert)"
      placeholder: "ex. is-expanded"
    class_collapsed:
      label: "Classe fermé (<li> quand le bloc enfants est fermé)"
      placeholder: "ex. is-collapsed"
    empty_choice: "— Vide —"
    css_section_heading: "Classes CSS pour le rendu (remplacent la config si définies)."
    section_definition: "Définition (code, base, nom, contexte, icône)"
    section_config: "Configuration (permissions, profondeur, repliable, CSS)"

  menu_item_type:
    section_basic: "Identité (libellés)"
    section_icon: "Identité (type, position, icône)"
    section_config: "Configuration (lien, permission)"
    label_required: "Le libellé est requis pour Lien et Section."
    label:
      label: Libellé
    label_locale: "Libellé (%locale%)"
    divider_label_hint: "Nom optionnel pour ce séparateur (recommandé pour l'accessibilité et la liste du tableau de bord). Laissez vide si vous n'avez besoin que d'un séparateur visuel."
    type:
      label: Type
      link: Lien
      section: Rubrique
      divider: Séparateur
      service: Service (URL à l'exécution)
    link_resolver:
      label: Résolveur de lien
      placeholder: "— Choisir un résolveur —"
      help: "Choisissez un service qui implémente MenuLinkResolverInterface. Il peut renvoyer une URL unique ou une liste de lignes de liens enfants (label, href, position) ; l'href parent sera alors « # »."
      service_id_placeholder: "ex. App\\Menu\\MyLinkResolver"
      help_free_text: "Saisissez l'id du service (nom de classe ou id conteneur) qui implémente MenuLinkResolverInterface."
      required: Un résolveur de lien est requis pour le type « Service ».
      route_params_hint: "JSON optionnel passé au résolveur (par exemple paramètres de type route)."
    position:
      label: Position
    link_type:
      label: Type de lien
      route: Route
      external_url: URL externe
    route_name:
      label: Nom de la route
      placeholder: "— Choisir une route —"
    route_params:
      label: "Paramètres de route (JSON)"
      placeholder: "{}"
    external_url:
      label: URL externe
      placeholder: "https://..."
    target_blank:
      label: Ouvrir dans un nouvel onglet
    permission_keys:
      label: Clés de permission
      placeholder: "— Tout autoriser —"
      help_csv: "Clés séparées par des virgules (utilisé quand aucune liste configurée n'est disponible)."
      choice:
        authenticated: "Authentifié uniquement"
        admin: "Admin uniquement"
        path__: "Chemin : / (accueil uniquement)"
    is_unanimous:
      label: Exiger toutes les clés sélectionnées
      help: "Activé : toutes les clés doivent passer (AND). Désactivé : une seule clé suffit (OR)."
    icon:
      label: Icône
      placeholder: "heroicons:home"
    parent:
      label: Parent
      placeholder: "— Racine (sans parent) —"
      help_inheritance: "Les éléments parents sont au-dessus dans l'arbre. Les clés de permission de cette ligne s'appliquent à cet élément ; votre MenuPermissionChecker décide comment combiner les règles parent/enfant. Les sections et liens extensibles ne s'affichent que si au moins un enfant est visible."
      circular_violation: "La hiérarchie parent circulaire n'est pas autorisée."
      section_must_be_root: "Les éléments section doivent rester au niveau racine (sans parent)."
    section_collapsible:
      label: "Enfants de section repliables"
      inherit: "Utiliser la valeur du menu"
      yes: "Oui (repliable avec chevron)"
      no: "Non (toujours dépliés)"
      help: "Remplace l'option du menu « Sections repliables » uniquement pour cette section. « Utiliser la valeur du menu » suit la configuration du menu."

  import_menu_type:
    file:
      label: Fichier JSON
      required: Veuillez choisir un fichier.
      mime_message: Le fichier doit être au format JSON.
    strategy:
      label: Si un menu avec le même code et contexte existe déjà
      skip_existing: Ignorer (ne pas importer)
      replace: Remplacer (supprimer les éléments existants et importer)

  copy_menu_type:
    code:
      label: Code
      placeholder: "ex. sidebar_copie"
      regex_message: "Le code ne peut contenir que des lettres, chiffres, tiret bas et trait d'union."
    name:
      label: Nom
      placeholder: "ex. Sidebar (copie)"
