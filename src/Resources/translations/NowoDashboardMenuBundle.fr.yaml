# Form: MenuType
form:
  menu_type:
    code:
      label: Code
      help: "Identifiant unique (lettres, chiffres, _ -). Pour les menus de base, le code ne peut pas être modifié après la création."
      placeholder: "ex. sidebar"
    base:
      label: "Menu de base"
      help: "Si coché, le code de ce menu ne pourra pas être modifié après la création."
    name:
      label: Nom
      placeholder: "ex. Sidebar"
    context:
      label: Contexte
      help: "Paires clé-valeur JSON optionnelles pour identifier cette variante de menu. Lors de la résolution par code, le premier menu correspondant dans la liste ordonnée des contextes est utilisé ; vide = repli pour ce code."
      placeholder: '{"partnerId": 1, "operatorId": 1}'
    icon:
      label: Icône
      help: "Identifiant d’icône optionnel (ex. Symfony UX Icons : heroicons:home, bootstrap:house)."
      placeholder: "ex. heroicons:bars-3, bootstrap:list"
    permission_checker:
      label: Vérificateur de permissions
      placeholder: "— Tout autoriser —"
      allow_all: "— Tout autoriser —"
      permission_key_aware: "— Par clé de permission (structure) —"
      help: "Service implémentant MenuPermissionCheckerInterface (vide = tout autoriser)."
    depth_limit:
      label: Limite de profondeur
      placeholder: "vide = illimité"
      help: "Profondeur maximale à rendre (1 = racine seule, 2 = racine + un niveau ; vide = illimité)."
    collapsible:
      label: "Repliable (menu dans un bloc avec bascule)"
    collapsible_expanded:
      label: "Repliable ouvert (ouvert par défaut)"
    nested_collapsible:
      label: "Repliable imbriqué (les éléments avec enfants ont une bascule)"
    nested_collapsible_sections:
      label: "Autoriser les sections à être repliables"
      help: "Lorsque le repliable imbriqué est activé, les sections peuvent afficher une bascule et replier leurs enfants. Désactivez pour toujours afficher les enfants des sections (sans bascule)."
    class_menu:
      label: "Classe menu (<ul> racine)"
      placeholder: "ex. nav flex-column"
    ul_id:
      label: "Id du menu (<ul> racine)"
      placeholder: "ex. main-menu-navigation"
    class_item:
      label: "Classe élément (<li>)"
      placeholder: "ex. nav-item"
    class_link:
      label: "Classe lien (<a>)"
      placeholder: "ex. nav-link"
    class_children:
      label: "Classe enfants (<ul> imbriqué)"
      placeholder: "ex. nav flex-column ms-2"
    class_section_label:
      label: "Classe libellé de section (itemType \"section\")"
      placeholder: "ex. navigation-header"
    class_section:
      label: "Classe section (<li> quand itemType \"section\")"
      placeholder: "ex. menu-section"
    class_divider:
      label: "Classe séparateur (<li> quand itemType \"divider\")"
      placeholder: "ex. menu-divider"
    class_current:
      label: "Classe actuel (lien correspondant à la route actuelle)"
      placeholder: "ex. active"
    class_branch_expanded:
      label: "Classe branche ouverte (<li> quand la route est dans la branche)"
      placeholder: "ex. active-branch"
    class_has_children:
      label: "Classe avec enfants (<li> quand l’élément a des enfants)"
      placeholder: "ex. has-children"
    class_expanded:
      label: "Classe ouvert (<li> quand le bloc enfants est ouvert)"
      placeholder: "ex. is-expanded"
    class_collapsed:
      label: "Classe fermé (<li> quand le bloc enfants est fermé)"
      placeholder: "ex. is-collapsed"
    empty_choice: "— Vide —"
    css_section_heading: "Classes CSS pour le rendu (remplacent la config si définies)."
    section_definition: "Définition (code, base, nom, contexte, icône)"
    section_config: "Configuration (permissions, profondeur, repliable, CSS)"

  menu_item_type:
    section_basic: "Identité (libellés)"
    section_icon: "Identité (type, position, icône)"
    section_config: "Configuration (lien, permission)"
    label_required: "Le libellé est requis pour Lien et Section."
    label:
      label: Libellé
    label_locale: "Libellé (%locale%)"
    type:
      label: Type
      link: Lien
      section: Section
      divider: Séparateur
    position:
      label: Position
    link_type:
      label: Type de lien
      route: Route
      external_url: URL externe
    route_name:
      label: Nom de la route
      placeholder: "— Choisir une route —"
    route_params:
      label: "Paramètres de route (JSON)"
      placeholder: "{}"
    external_url:
      label: URL externe
      placeholder: "https://..."
    target_blank:
      label: Ouvrir dans un nouvel onglet
    permission_keys:
      label: Clés de permission
      placeholder: "— Tout autoriser —"
      help_csv: "Clés séparées par des virgules (utilisé quand aucune liste configurée n’est disponible)."
      choice:
        authenticated: "Authentifié uniquement"
        admin: "Admin uniquement"
        path__: "Chemin : / (accueil uniquement)"
    is_unanimous:
      label: Exiger toutes les clés sélectionnées
      help: "Activé : toutes les clés doivent passer (AND). Désactivé : une seule clé suffit (OR)."
    icon:
      label: Icône
      placeholder: "heroicons:home"
    parent:
      label: Parent
      placeholder: "— Racine (sans parent) —"
      circular_violation: "La hiérarchie parent circulaire n'est pas autorisée."

  import_menu_type:
    file:
      label: Fichier JSON
      required: Veuillez choisir un fichier.
      mime_message: Le fichier doit être au format JSON.
    strategy:
      label: Si un menu avec le même code et contexte existe déjà
      skip_existing: Ignorer (ne pas importer)
      replace: Remplacer (supprimer les éléments existants et importer)

  copy_menu_type:
    code:
      label: Code
      placeholder: "ex. sidebar_copie"
      regex_message: "Le code ne peut contenir que des lettres, chiffres, tiret bas et trait d’union."
    name:
      label: Nom
      placeholder: "ex. Sidebar (copie)"
