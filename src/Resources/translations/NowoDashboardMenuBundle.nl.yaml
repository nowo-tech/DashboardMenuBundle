# Form: MenuType
form:
  menu_type:
    code:
      label: Code
      help: "Unieke identificatie (letters, cijfers, _ -). Voor basismenu's kan de code na aanmaak niet worden gewijzigd."
      placeholder: "bijv. sidebar"
    base:
      label: "Basismenu"
      help: "Indien aangevinkt, kan de code van dit menu na aanmaak niet worden gewijzigd."
    name:
      label: Naam
      placeholder: "bijv. Sidebar"
    context:
      label: Context
      help: "Optionele JSON-sleutel-waardeparen om deze menuvariant te identificeren. Bij opzoeken op code wordt het eerste overeenkomende menu in de geordende contextsets gebruikt; leeg = fallback voor die code."
      placeholder: '{"partnerId": 1, "operatorId": 1}'
    icon:
      label: Pictogram
      help: "Optionele pictogramidentificatie (bijv. Symfony UX Icons: heroicons:home, bootstrap:house)."
      placeholder: "bijv. heroicons:bars-3, bootstrap:list"
    permission_checker:
      label: Machtigingscontrole
      placeholder: "— Alles toestaan —"
      allow_all: "— Alles toestaan —"
      permission_key_aware: "— Op machtigingssleutel (structuur) —"
      help: "Service die MenuPermissionCheckerInterface implementeert (leeg = alles toestaan)."
    depth_limit:
      label: Dieptelimiet
      placeholder: "leeg = onbeperkt"
      help: "Maximale diepte om te renderen (1 = alleen root, 2 = root + één niveau; leeg = onbeperkt)."
    collapsible:
      label: "Inklapbaar (menu in schakelblok)"
    collapsible_expanded:
      label: "Inklapbaar uitgevouwen (standaard open)"
    nested_collapsible:
      label: "Genest inklapbaar (items met kinderen hebben schakelaar)"
    nested_collapsible_sections:
      label: "Inklapbare secties"
      help: "Vereist genest inklapbaar. Indien ingeschakeld tonen sectierijen een chevron rechts en hun links kunnen worden ingeklapt. Indien uitgeschakeld blijven sectiekinderen altijd uitgevouwen (zonder chevron)."
    class_menu:
      label: "Klasse menu (root-<ul>)"
      placeholder: "bijv. nav flex-column"
    ul_id:
      label: "Ul-id (root-<ul>)"
      placeholder: "bijv. main-menu-navigation"
    class_item:
      label: "Klasse item (<li>)"
      placeholder: "bijv. nav-item"
    class_link:
      label: "Klasse link (<a>)"
      placeholder: "bijv. nav-link"
    class_children:
      label: "Klasse kinderen (genest <ul>)"
      placeholder: "bijv. nav flex-column ms-2"
    class_section_children:
      label: "Klasse sectiekinderen (<ul> onder itemType \"section\")"
      placeholder: "bijv. nav flex-column list-unstyled ps-0 (vlak; leeg = zelfde als kinderen)"
      help: "Indien ingesteld gebruikt de eerste niveaulijst onder elke sectie deze klassen in plaats van „Klasse kinderen“, zodat links uitlijnen met de sectietitel (zonder inspringing). Leeg laten om de geneste kinderenklasse te blijven gebruiken."
    class_section_child_item:
      label: "Klasse <li> voor directe kinderen van itemType \"section\""
      placeholder: "bijv. nav-item ms-0 (leeg = zelfde als Klasse item)"
      help: "Indien ingesteld gebruiken links en scheidingen die directe kinderen van een sectie zijn deze klasse voor <li> in plaats van „Klasse item“. Voor marge-/padding-aanpassingen onder vlakke sectielijsten."
    class_section_child_link:
      label: "Klasse <a> voor directe kinderen van itemType \"section\""
      placeholder: "bijv. d-flex align-items-center ps-0 (leeg = zelfde als Klasse link)"
      help: "Indien ingesteld gebruiken links die directe kinderen van een sectie zijn deze klasse voor <a> in plaats van „Klasse link“. Werkt samen met sectiekind-<li> voor uitlijning."
    class_section_label:
      label: "Klasse sectielabel (itemType \"section\")"
      placeholder: "bijv. navigation-header"
    class_section:
      label: "Klasse sectie (<li> wanneer itemType \"section\")"
      placeholder: "bijv. menu-section"
    class_divider:
      label: "Klasse scheiding (<li> wanneer itemType \"divider\")"
      placeholder: "bijv. menu-divider"
    class_current:
      label: "Klasse actueel (link die overeenkomt met huidige route)"
      placeholder: "bijv. active"
    class_branch_expanded:
      label: "Klasse tak uitgevouwen (<li> wanneer route in tak)"
      placeholder: "bijv. active-branch"
    class_has_children:
      label: "Klasse heeft kinderen (<li> wanneer item kinderen heeft)"
      placeholder: "bijv. has-children"
    class_expanded:
      label: "Klasse uitgevouwen (<li> wanneer kinderenblok open is)"
      placeholder: "bijv. is-expanded"
    class_collapsed:
      label: "Klasse ingeklapt (<li> wanneer kinderenblok gesloten is)"
      placeholder: "bijv. is-collapsed"
    empty_choice: "— Leeg —"
    css_section_heading: "CSS-klassen voor rendering (overschrijven config indien ingesteld)."
    section_definition: "Definitie (code, basis, naam, context, pictogram)"
    section_config: "Configuratie (machtigingen, diepte, inklapbaar, CSS)"

  menu_item_type:
    section_basic: "Identiteit (labels)"
    section_icon: "Identiteit (type, positie, pictogram)"
    section_config: "Configuratie (link, machtiging)"
    label_required: "Label is verplicht voor Link en Sectie."
    label:
      label: Label
    label_locale: "Label (%locale%)"
    divider_label_hint: "Optionele naam voor deze scheiding (aanbevolen voor toegankelijkheid en de dashboardlijst). Laat leeg als u alleen een visuele scheiding nodig hebt."
    type:
      label: Type
      link: Link
      section: Sectie
      divider: Scheiding
      service: Service (runtime-URL)
    link_resolver:
      label: Linkresolver
      placeholder: "— Resolver kiezen —"
      help: "Kies een service die MenuLinkResolverInterface implementeert. Deze kan een enkele URL of een lijst van onderliggende linkrijen (label, href, position) retourneren; de bovenliggende href is dan \"#\"."
      service_id_placeholder: "bijv. App\\Menu\\MyLinkResolver"
      help_free_text: "Voer de service-id in (klassenaam of container-id) die MenuLinkResolverInterface implementeert."
      required: Voor type „Service“ is een linkresolver vereist.
      route_params_hint: "Optionele JSON doorgegeven aan de resolver (bijvoorbeeld routeparameters)."
    position:
      label: Positie
    link_type:
      label: Linktype
      route: Route
      external_url: Externe URL
    route_name:
      label: Routenaam
      placeholder: "— Route selecteren —"
    route_params:
      label: "Routeparameters (JSON)"
      placeholder: "{}"
    external_url:
      label: Externe URL
      placeholder: "https://..."
    target_blank:
      label: Openen in nieuw tabblad
    permission_keys:
      label: Machtigingssleutels
      placeholder: "— Alles toestaan —"
      help_csv: "Kommagescheiden sleutels (gebruikt wanneer geen geconfigureerde keuzes beschikbaar zijn)."
      choice:
        authenticated: "Alleen geauthenticeerd"
        admin: "Alleen admin"
        path__: "Pad: / (alleen startpagina)"
    is_unanimous:
      label: Alle geselecteerde sleutels vereisen
      help: "Ingeschakeld: alle sleutels moeten slagen (EN). Uitgeschakeld: één sleutel volstaat (OF)."
    icon:
      label: Pictogram
      placeholder: "heroicons:home"
    parent:
      label: Ouder
      placeholder: "— Root (geen ouder) —"
      help_inheritance: "Ouderitems staan hoger in de boom. Machtigingssleutels op deze rij gelden voor dit item; uw MenuPermissionChecker bepaalt hoe ouder/kind-regels combineren. Secties en uitklapbare links worden alleen getoond als minstens één kind zichtbaar is."
      circular_violation: "Circulaire ouderhiërarchie is niet toegestaan."
      section_must_be_root: "Sectie-items moeten op rootniveau blijven (geen ouder)."
    section_collapsible:
      label: "Sectiekinderen inklapbaar"
      inherit: "Menustandaard gebruiken"
      yes: "Ja (inklapbaar met chevron)"
      no: "Nee (altijd uitgevouwen)"
      help: "Overschrijft de menuoptie „Inklapbare secties“ alleen voor deze sectie. „Menustandaard gebruiken“ volgt de menuconfiguratie."

  import_menu_type:
    file:
      label: JSON-bestand
      required: Kies een bestand.
      mime_message: Bestand moet JSON zijn.
    strategy:
      label: Wanneer een menu met dezelfde code en context al bestaat
      skip_existing: Overslaan (niet importeren)
      replace: Vervangen (bestaande items verwijderen en importeren)

  copy_menu_type:
    code:
      label: Code
      placeholder: "bijv. sidebar_kopie"
      regex_message: "Code mag alleen letters, cijfers, underscore en koppelteken bevatten."
    name:
      label: Naam
      placeholder: "bijv. Sidebar (kopie)"
