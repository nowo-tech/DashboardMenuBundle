# Form: MenuType
form:
  menu_type:
    code:
      label: Código
      help: "Identificador único (letras, números, _ -). En menús base el código no se puede cambiar tras la creación."
      placeholder: "ej. sidebar"
    base:
      label: "Menú base"
      help: "Si está marcado, el código de este menú no podrá cambiarse tras la creación."
    name:
      label: Nombre
      placeholder: "ej. Sidebar"
    context:
      label: Contexto
      help: "Pares clave-valor JSON opcionales que identifican esta variante del menú. Al resolver por code se usa el primer menú que coincida en la lista ordenada de contextos; vacío = fallback para ese code."
      placeholder: '{"partnerId": 1, "operatorId": 1}'
    icon:
      label: Icono
      help: "Identificador de icono opcional (ej. Symfony UX Icons: heroicons:home, bootstrap:house)."
      placeholder: "ej. heroicons:bars-3, bootstrap:list"
    permission_checker:
      label: Comprobador de permisos
      placeholder: "— Permitir todo —"
      allow_all: "— Permitir todo —"
      permission_key_aware: "— Por clave de permiso (estructura) —"
      help: "Servicio que implementa MenuPermissionCheckerInterface (vacío = permitir todo)."
    depth_limit:
      label: Límite de profundidad
      placeholder: "vacío = sin límite"
      help: "Profundidad máxima a renderizar (1 = solo raíz, 2 = raíz + un nivel; vacío = sin límite)."
    collapsible:
      label: "Colapsible (menú en bloque con alternar)"
    collapsible_expanded:
      label: "Colapsible expandido (abierto por defecto)"
    nested_collapsible:
      label: "Colapsible anidado (los ítems con hijos tienen alternar)"
    nested_collapsible_sections:
      label: "Secciones colapsables"
      help: "Requiere colapsible anidado activo. Si está marcado, la fila de cada sección muestra un chevron a la derecha y los enlaces debajo se pueden plegar. Si no, los hijos de la sección quedan siempre desplegados (sin chevron)."
    class_menu:
      label: "Clase menú (<ul> raíz)"
      placeholder: "ej. nav flex-column"
    ul_id:
      label: "Id del menú (<ul> raíz)"
      placeholder: "ej. main-menu-navigation"
    class_item:
      label: "Clase ítem (<li>)"
      placeholder: "ej. nav-item"
    class_link:
      label: "Clase enlace (<a>)"
      placeholder: "ej. nav-link"
    class_children:
      label: "Clase hijos (<ul> anidado)"
      placeholder: "ej. nav flex-column ms-2"
    class_section_children:
      label: "Clase hijos de sección (<ul> bajo itemType \"section\")"
      placeholder: "ej. nav flex-column list-unstyled ps-0 (plano; vacío = igual que hijos)"
      help: "Si se rellena, la lista bajo cada sección usa estas clases en lugar de «Clase hijos», para alinear los enlaces con el título de la sección (sin sangría). Vacío = se sigue usando la clase de hijos anidados."
    class_section_child_item:
      label: "Clase <li> de hijos directos de itemType \"section\""
      placeholder: "ej. nav-item ms-0 (vacío = igual que Clase ítem)"
      help: "Si se rellena, los enlaces y divisores hijos directos de una sección usan esta clase en el <li> en lugar de «Clase ítem». Útil para ajustar márgenes o padding bajo listas planas de sección."
    class_section_child_link:
      label: "Clase <a> de hijos directos de itemType \"section\""
      placeholder: "ej. d-flex align-items-center ps-0 (vacío = igual que Clase enlace)"
      help: "Si se rellena, los enlaces hijos directos de una sección usan esta clase en el <a> en lugar de «Clase enlace». Complementa la clase de <li> de hijo de sección."
    class_section_label:
      label: "Clase etiqueta de sección (itemType \"section\")"
      placeholder: "ej. navigation-header"
    class_section:
      label: "Clase sección (<li> cuando itemType \"section\")"
      placeholder: "ej. menu-section"
    class_divider:
      label: "Clase divisor (<li> cuando itemType \"divider\")"
      placeholder: "ej. menu-divider"
    class_current:
      label: "Clase actual (enlace que coincide con la ruta actual)"
      placeholder: "ej. active"
    class_branch_expanded:
      label: "Clase rama expandida (<li> cuando la ruta está en la rama)"
      placeholder: "ej. active-branch"
    class_has_children:
      label: "Clase con hijos (<li> cuando el ítem tiene hijos)"
      placeholder: "ej. has-children"
    class_expanded:
      label: "Clase expandido (<li> cuando el bloque de hijos está abierto)"
      placeholder: "ej. is-expanded"
    class_collapsed:
      label: "Clase colapsado (<li> cuando el bloque de hijos está cerrado)"
      placeholder: "ej. is-collapsed"
    empty_choice: "— Vacío —"
    css_section_heading: "Clases CSS para renderizado (sobrescriben la config si se definen)."
    section_definition: "Definición (código, base, nombre, contexto, icono)"
    section_config: "Configuración (permisos, profundidad, colapsable, CSS)"

  menu_item_type:
    section_basic: "Identidad (etiquetas)"
    section_icon: "Identidad (tipo, posición, icono)"
    section_config: "Configuración (enlace, permiso)"
    label_required: "La etiqueta es obligatoria para Enlace y Sección."
    label:
      label: Etiqueta
    label_locale: "Etiqueta (%locale%)"
    divider_label_hint: "Nombre opcional para este divisor (recomendado por accesibilidad y para la lista del panel). Déjalo vacío si solo necesitas un separador visual."
    type:
      label: Tipo
      link: Enlace
      section: Sección
      divider: Divisor
      service: Servicio (URL en tiempo de ejecución)
    link_resolver:
      label: Resolvedor de enlace
      placeholder: "— Elegir resolvedor —"
      help: "Elige un servicio que implemente MenuLinkResolverInterface. Puede devolver una URL o una lista de enlaces hijos (label, href, position); en ese caso el padre usa href \"#\"."
      service_id_placeholder: "ej. App\\Menu\\MiResolvedorEnlace"
      help_free_text: "Indica el id del servicio (FQCN o id de contenedor) que implementa MenuLinkResolverInterface."
      required: El tipo «Servicio» requiere un resolvedor de enlace.
      route_params_hint: "JSON opcional que recibe el resolvedor (por ejemplo parámetros tipo ruta)."
    position:
      label: Posición
    link_type:
      label: Tipo de enlace
      route: Ruta
      external_url: URL externa
    route_name:
      label: Nombre de ruta
      placeholder: "— Seleccionar ruta —"
    route_params:
      label: "Parámetros de ruta (JSON)"
      placeholder: "{}"
    external_url:
      label: URL externa
      placeholder: "https://..."
    target_blank:
      label: Abrir en nueva pestaña
    permission_keys:
      label: Claves de permiso
      placeholder: "— Permitir todos —"
      help_csv: "Claves separadas por comas (se usa cuando no hay opciones configuradas)."
      choice:
        authenticated: "Solo autenticados"
        admin: "Solo admin"
        path__: "Ruta: / (solo inicio)"
    is_unanimous:
      label: Requerir todas las claves seleccionadas
      help: "Activado: todas las claves deben cumplirse (AND). Desactivado: basta cualquier clave (OR)."
    icon:
      label: Icono
      placeholder: "heroicons:home"
    parent:
      label: Padre
      placeholder: "— Raíz (sin padre) —"
      help_inheritance: "Los ítems padre quedan por encima en el árbol. Las claves de permiso de esta fila aplican a este ítem; tu MenuPermissionChecker define cómo se combinan reglas de padres e hijos. Las secciones y los enlaces con hijos solo se muestran si al menos un hijo es visible."
      circular_violation: "No se permite una jerarquía circular de padres."
      section_must_be_root: "Los ítems de tipo sección deben quedar en la raíz (sin padre)."
    section_collapsible:
      label: "Hijos de la sección colapsables"
      inherit: "Usar valor del menú"
      yes: "Sí (colapsable con chevron)"
      no: "No (siempre desplegados)"
      help: "Anula la opción del menú «Secciones colapsables» solo para esta sección. «Usar valor del menú» aplica la configuración del menú."

  import_menu_type:
    file:
      label: Archivo JSON
      required: Elige un archivo.
      mime_message: El archivo debe ser JSON.
    strategy:
      label: Si ya existe un menú con el mismo código y contexto
      skip_existing: Omitir (no importar)
      replace: Reemplazar (borrar ítems existentes e importar)

  copy_menu_type:
    code:
      label: Código
      placeholder: "ej. sidebar_copia"
      regex_message: "El código solo puede contener letras, números, guión bajo y guión."
    name:
      label: Nombre
      placeholder: "ej. Sidebar (copia)"
