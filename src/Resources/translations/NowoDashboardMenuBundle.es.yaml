# Form: MenuType
form:
  menu_type:
    code:
      label: Código
      help: "Identificador único (letras, números, _ -). En menús base el código no se puede cambiar tras la creación."
      placeholder: "ej. sidebar"
    base:
      label: "Menú base"
      help: "Si está marcado, el código de este menú no podrá cambiarse tras la creación."
    name:
      label: Nombre
      placeholder: "ej. Sidebar"
    context:
      label: Contexto
      help: "Pares clave-valor JSON opcionales que identifican esta variante del menú. Al resolver por code se usa el primer menú que coincida en la lista ordenada de contextos; vacío = fallback para ese code."
      placeholder: '{"partnerId": 1, "operatorId": 1}'
    icon:
      label: Icono
      help: "Identificador de icono opcional (ej. Symfony UX Icons: heroicons:home, bootstrap:house)."
      placeholder: "ej. heroicons:bars-3, bootstrap:list"
    permission_checker:
      label: Comprobador de permisos
      placeholder: "— Permitir todo —"
      allow_all: "— Permitir todo —"
      permission_key_aware: "— Por clave de permiso (estructura) —"
      help: "Servicio que implementa MenuPermissionCheckerInterface (vacío = permitir todo)."
    depth_limit:
      label: Límite de profundidad
      placeholder: "vacío = sin límite"
      help: "Profundidad máxima a renderizar (1 = solo raíz, 2 = raíz + un nivel; vacío = sin límite)."
    collapsible:
      label: "Colapsible (menú en bloque con alternar)"
    collapsible_expanded:
      label: "Colapsible expandido (abierto por defecto)"
    nested_collapsible:
      label: "Colapsible anidado (los ítems con hijos tienen alternar)"
    nested_collapsible_sections:
      label: "Permitir que las secciones sean colapsables"
      help: "Cuando el colapsado anidado está activo, las secciones pueden mostrar un toggle y colapsar sus hijos. Desactívalo para mostrar siempre los hijos de las secciones (sin toggle)."
    class_menu:
      label: "Clase menú (<ul> raíz)"
      placeholder: "ej. nav flex-column"
    class_item:
      label: "Clase ítem (<li>)"
      placeholder: "ej. nav-item"
    class_link:
      label: "Clase enlace (<a>)"
      placeholder: "ej. nav-link"
    class_children:
      label: "Clase hijos (<ul> anidado)"
      placeholder: "ej. nav flex-column ms-2"
    class_section_label:
      label: "Clase etiqueta de sección (itemType \"section\")"
      placeholder: "ej. navigation-header"
    class_current:
      label: "Clase actual (enlace que coincide con la ruta actual)"
      placeholder: "ej. active"
    class_branch_expanded:
      label: "Clase rama expandida (<li> cuando la ruta está en la rama)"
      placeholder: "ej. active-branch"
    class_has_children:
      label: "Clase con hijos (<li> cuando el ítem tiene hijos)"
      placeholder: "ej. has-children"
    class_expanded:
      label: "Clase expandido (<li> cuando el bloque de hijos está abierto)"
      placeholder: "ej. is-expanded"
    class_collapsed:
      label: "Clase colapsado (<li> cuando el bloque de hijos está cerrado)"
      placeholder: "ej. is-collapsed"
    empty_choice: "— Vacío —"
    css_section_heading: "Clases CSS para renderizado (sobrescriben la config si se definen)."
    section_definition: "Definición (código, base, nombre, contexto, icono)"
    section_config: "Configuración (permisos, profundidad, colapsable, CSS)"

  menu_item_type:
    section_basic: "Identidad (tipo, icono, etiquetas)"
    section_config: "Configuración (enlace, posición, permiso)"
    label_required: "La etiqueta es obligatoria para Enlace y Sección."
    label:
      label: Etiqueta
    label_locale: "Etiqueta (%locale%)"
    type:
      label: Tipo
      link: Enlace
      section: Sección
      divider: Divisor
    position:
      label: Posición
    link_type:
      label: Tipo de enlace
      route: Ruta
      external_url: URL externa
    route_name:
      label: Nombre de ruta
      placeholder: "— Seleccionar ruta —"
    route_params:
      label: "Parámetros de ruta (JSON)"
      placeholder: "{}"
    external_url:
      label: URL externa
      placeholder: "https://..."
    target_blank:
      label: Abrir en nueva pestaña
    permission_key:
      label: Clave de permiso
      placeholder: "— Permitir todos —"
      choice:
        authenticated: "Solo autenticados"
        admin: "Solo admin"
        path__: "Ruta: / (solo inicio)"
    icon:
      label: Icono
      placeholder: "heroicons:home"
    parent:
      label: Padre
      placeholder: "— Raíz (sin padre) —"

  import_menu_type:
    file:
      label: Archivo JSON
      required: Elige un archivo.
      mime_message: El archivo debe ser JSON.
    strategy:
      label: Si ya existe un menú con el mismo código y contexto
      skip_existing: Omitir (no importar)
      replace: Reemplazar (borrar ítems existentes e importar)

  copy_menu_type:
    code:
      label: Código
      placeholder: "ej. sidebar_copia"
      regex_message: "El código solo puede contener letras, números, guión bajo y guión."
    name:
      label: Nombre
      placeholder: "ej. Sidebar (copia)"
