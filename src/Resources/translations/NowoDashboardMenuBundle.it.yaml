# Form: MenuType
form:
  menu_type:
    code:
      label: Codice
      help: "Identificatore univoco (lettere, numeri, _ -). Per i menu base il codice non può essere modificato dopo la creazione."
      placeholder: "es. sidebar"
    base:
      label: "Menu base"
      help: "Se attivo, il codice di questo menu non potrà essere modificato dopo la creazione."
    name:
      label: Nome
      placeholder: "es. Sidebar"
    context:
      label: Contesto
      help: "Coppie chiave-valore JSON opzionali per identificare questa variante di menu. In risoluzione per codice si usa il primo menu corrispondente nell'elenco ordinato dei contesti; vuoto = fallback per quel codice."
      placeholder: '{"partnerId": 1, "operatorId": 1}'
    icon:
      label: Icona
      help: "Identificativo icona opzionale (es. Symfony UX Icons: heroicons:home, bootstrap:house)."
      placeholder: "es. heroicons:bars-3, bootstrap:list"
    permission_checker:
      label: Controllo permessi
      placeholder: "— Consenti tutto —"
      allow_all: "— Consenti tutto —"
      permission_key_aware: "— Per chiave permesso (struttura) —"
      help: "Servizio che implementa MenuPermissionCheckerInterface (vuoto = consenti tutto)."
    depth_limit:
      label: Limite profondità
      placeholder: "vuoto = illimitato"
      help: "Profondità massima da renderizzare (1 = solo radice, 2 = radice + un livello; vuoto = illimitato)."
    collapsible:
      label: "Comprimibile (menu in blocco con toggle)"
    collapsible_expanded:
      label: "Comprimibile espanso (aperto di default)"
    nested_collapsible:
      label: "Comprimibile annidato (elementi con figli hanno toggle)"
    nested_collapsible_sections:
      label: "Sezioni collassabili"
      help: "Richiede comprimibile annidato. Se attivo, le righe sezione mostrano un chevron a destra e i link sottostanti possono essere ripiegati. Se disattivo, i figli della sezione restano sempre espansi (senza chevron)."
    class_menu:
      label: "Classe menu (<ul> radice)"
      placeholder: "es. nav flex-column"
    ul_id:
      label: "Id ul (radice <ul>)"
      placeholder: "es. main-menu-navigation"
    class_item:
      label: "Classe voce (<li>)"
      placeholder: "es. nav-item"
    class_link:
      label: "Classe link (<a>)"
      placeholder: "es. nav-link"
    class_children:
      label: "Classe figli (<ul> annidato)"
      placeholder: "es. nav flex-column ms-2"
    class_section_children:
      label: "Classe figli sezione (<ul> sotto itemType \"section\")"
      placeholder: "es. nav flex-column list-unstyled ps-0 (piatto; vuoto = come figli)"
      help: "Se impostato, la lista di primo livello sotto ogni sezione usa queste classi invece di «Classe figli», per allineare i link al titolo della sezione (senza rientro). Lasciare vuoto per continuare a usare la classe figli annidati."
    class_section_child_item:
      label: "Classe <li> per figli diretti di itemType \"section\""
      placeholder: "es. nav-item ms-0 (vuoto = come Classe voce)"
      help: "Se impostato, link e divisori figli diretti di una sezione usano questa classe per <li> invece di «Classe voce». Utile per margini/padding sotto liste piatte di sezione."
    class_section_child_link:
      label: "Classe <a> per figli diretti di itemType \"section\""
      placeholder: "es. d-flex align-items-center ps-0 (vuoto = come Classe link)"
      help: "Se impostato, i link figli diretti di una sezione usano questa classe per <a> invece di «Classe link». Si abbina alla classe <li> figlio sezione per l'allineamento."
    class_section_label:
      label: "Classe etichetta sezione (itemType \"section\")"
      placeholder: "es. navigation-header"
    class_section:
      label: "Classe sezione (<li> quando itemType \"section\")"
      placeholder: "es. menu-section"
    class_divider:
      label: "Classe divisore (<li> quando itemType \"divider\")"
      placeholder: "es. menu-divider"
    class_current:
      label: "Classe corrente (link alla route corrente)"
      placeholder: "es. active"
    class_branch_expanded:
      label: "Classe ramo espanso (<li> quando la route è nel ramo)"
      placeholder: "es. active-branch"
    class_has_children:
      label: "Classe ha figli (<li> quando l'elemento ha figli)"
      placeholder: "es. has-children"
    class_expanded:
      label: "Classe espanso (<li> quando il blocco figli è aperto)"
      placeholder: "es. is-expanded"
    class_collapsed:
      label: "Classe compresso (<li> quando il blocco figli è chiuso)"
      placeholder: "es. is-collapsed"
    empty_choice: "— Vuoto —"
    css_section_heading: "Classi CSS per il rendering (sovrascrivono la config se impostate)."
    section_definition: "Definizione (codice, base, nome, contesto, icona)"
    section_config: "Configurazione (permessi, profondità, collassabile, CSS)"

  menu_item_type:
    section_basic: "Identità (etichette)"
    section_icon: "Identità (tipo, posizione, icona)"
    section_config: "Configurazione (link, permesso)"
    label_required: "L'etichetta è obbligatoria per Link e Sezione."
    label:
      label: Etichetta
    label_locale: "Etichetta (%locale%)"
    divider_label_hint: "Nome opzionale per questo divisore (consigliato per accessibilità e lista dashboard). Lascia vuoto se serve solo un separatore visivo."
    type:
      label: Tipo
      link: Link
      section: Sezione
      divider: Divisore
      service: Servizio (URL runtime)
    link_resolver:
      label: Risolutore link
      placeholder: "— Seleziona risolutore —"
      help: "Scegli un servizio che implementa MenuLinkResolverInterface. Può restituire una singola URL o un elenco di righe link figlie (label, href, position); l'href del genitore sarà allora \"#\"."
      service_id_placeholder: "es. App\\Menu\\MyLinkResolver"
      help_free_text: "Inserisci l'id del servizio (nome classe o id contenitore) che implementa MenuLinkResolverInterface."
      required: Il tipo «Servizio» richiede un risolutore link.
      route_params_hint: "JSON opzionale passato al risolutore (ad esempio parametri simili a route)."
    position:
      label: Posizione
    link_type:
      label: Tipo link
      route: Route
      external_url: URL esterna
    route_name:
      label: Nome route
      placeholder: "— Seleziona route —"
    route_params:
      label: "Parametri route (JSON)"
      placeholder: "{}"
    external_url:
      label: URL esterna
      placeholder: "https://..."
    target_blank:
      label: Apri in nuova scheda
    permission_keys:
      label: Chiavi permesso
      placeholder: "— Consenti tutti —"
      help_csv: "Chiavi separate da virgola (usate quando non ci sono scelte configurate)."
      choice:
        authenticated: "Solo autenticati"
        admin: "Solo admin"
        path__: "Percorso: / (solo home)"
    is_unanimous:
      label: Richiedi tutte le chiavi selezionate
      help: "Attivato: tutte le chiavi devono essere soddisfatte (AND). Disattivato: basta una chiave (OR)."
    icon:
      label: Icona
      placeholder: "heroicons:home"
    parent:
      label: Genitore
      placeholder: "— Radice (nessun genitore) —"
      help_inheritance: "Gli elementi genitore stanno sopra nell'albero. Le chiavi permesso di questa riga si applicano a questo elemento; il MenuPermissionChecker decide come combinare regole genitore/figlio. Sezioni e link espandibili si mostrano solo se almeno un figlio è visibile."
      circular_violation: "Gerarchia circolare di genitori non consentita."
      section_must_be_root: "Gli elementi sezione devono restare a livello radice (nessun genitore)."
    section_collapsible:
      label: "Figli sezione collassabili"
      inherit: "Usa valore menu"
      yes: "Sì (collassabile con chevron)"
      no: "No (sempre espansi)"
      help: "Sovrascrive l'opzione del menu «Sezioni collassabili» solo per questa sezione. «Usa valore menu» segue la configurazione del menu."

  import_menu_type:
    file:
      label: File JSON
      required: Scegli un file.
      mime_message: Il file deve essere JSON.
    strategy:
      label: Se esiste già un menu con lo stesso codice e contesto
      skip_existing: Salta (non importare)
      replace: Sostituisci (elimina voci esistenti e importa)

  copy_menu_type:
    code:
      label: Codice
      placeholder: "es. sidebar_copia"
      regex_message: "Il codice deve contenere solo lettere, numeri, underscore e trattino."
    name:
      label: Nome
      placeholder: "es. Sidebar (copia)"
