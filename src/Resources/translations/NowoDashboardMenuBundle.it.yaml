      label: "Classe ha figli"
      placeholder: "es. has-children"
    class_expanded:
      label: "Classe espanso"
      placeholder: "es. is-expanded"
    class_collapsed:
      label: "Classe compresso"
      placeholder: "es. is-collapsed"
