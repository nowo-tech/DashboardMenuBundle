form:
  menu_type:
    code:
      label: Codice
      help: "Identificatore univoco (lettere, numeri, _ -). Per i menu base il codice non può essere modificato."
      placeholder: "es. sidebar"
    base:
      label: "Menu base"
      help: "Se attivo, il codice di questo menu non potrà essere modificato dopo la creazione."
    name:
      label: Nome
      placeholder: "es. Sidebar"
    context:
      label: Contesto
      help: "Coppie chiave-valore JSON opzionali per identificare questa variante di menu."
      placeholder: '{"partnerId": 1, "operatorId": 1}'
