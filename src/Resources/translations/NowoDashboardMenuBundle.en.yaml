# Form: MenuType
form:
  menu_type:
    code:
      label: Code
      help: "Unique identifier (letters, numbers, _ -). For base menus, code cannot be changed after creation."
      placeholder: "e.g. sidebar"
    base:
      label: "Base menu"
      help: "When checked, this menu's code cannot be changed after creation."
    name:
      label: Name
      placeholder: "e.g. Sidebar"
    context:
      label: Context
      help: "Optional JSON key-value pairs to identify this menu variant. When resolving by code, the first matching menu in the ordered context sets is used; empty = fallback for that code."
      placeholder: '{"partnerId": 1, "operatorId": 1}'
    icon:
      label: Icon
      help: "Optional icon identifier (e.g. Symfony UX Icons: heroicons:home, bootstrap:house)."
      placeholder: "e.g. heroicons:bars-3, bootstrap:list"
    permission_checker:
      label: Permission checker
      placeholder: "— Allow all —"
      allow_all: "— Allow all —"
      permission_key_aware: "— By permission key (structure) —"
      help: "Service implementing MenuPermissionCheckerInterface (empty = allow all)."
    depth_limit:
      label: Depth limit
      placeholder: "empty = unlimited"
      help: "Max depth to render (1 = root only, 2 = root + one level; empty = unlimited)."
    collapsible:
      label: "Collapsible (wrap menu in toggle block)"
    collapsible_expanded:
      label: "Collapsible expanded (open by default)"
    nested_collapsible:
      label: "Nested collapsible (items with children have toggle)"
    nested_collapsible_sections:
      label: "Allow section items to be collapsible"
      help: "When nested collapsible is enabled, section items can show a toggle and collapse their children. Disable to always show section children (no toggle)."
    class_menu:
      label: "Class menu (root <ul>)"
      placeholder: "e.g. nav flex-column"
    class_item:
      label: "Class item (<li>)"
      placeholder: "e.g. nav-item"
    class_link:
      label: "Class link (<a>)"
      placeholder: "e.g. nav-link"
    class_children:
      label: "Class children (nested <ul>)"
      placeholder: "e.g. nav flex-column ms-2"
    class_section_label:
      label: "Class section label (itemType \"section\")"
      placeholder: "e.g. navigation-header"
    class_current:
      label: "Class current (link matching current route)"
      placeholder: "e.g. active"
    class_branch_expanded:
      label: "Class branch expanded (<li> when route in branch)"
      placeholder: "e.g. active-branch"
    class_has_children:
      label: "Class has children (<li> when item has children)"
      placeholder: "e.g. has-children"
    class_expanded:
      label: "Class expanded (<li> when children block is open)"
      placeholder: "e.g. is-expanded"
    class_collapsed:
      label: "Class collapsed (<li> when children block is closed)"
      placeholder: "e.g. is-collapsed"
    empty_choice: "— Empty —"
    css_section_heading: "CSS classes for rendering (override config when set)."
    section_definition: "Definition (code, base, name, context, icon)"
    section_config: "Configuration (permissions, depth, collapsible, CSS)"

  menu_item_type:
    section_basic: "Identity (type, icon, labels)"
    section_config: "Configuration (link, position, permission)"
    label_required: "Label is required for Link and Section."
    label:
      label: Label
    label_locale: "Label (%locale%)"
    type:
      label: Type
      link: Link
      section: Section
      divider: Divider
    position:
      label: Position
    link_type:
      label: Link type
      route: Route
      external_url: External URL
    route_name:
      label: Route name
      placeholder: "— Select route —"
    route_params:
      label: "Route params (JSON)"
      placeholder: "{}"
    external_url:
      label: External URL
      placeholder: "https://..."
    target_blank:
      label: Open in new tab
    permission_key:
      label: Permission key
      placeholder: "— Allow all —"
      choice:
        authenticated: "Authenticated only"
        admin: "Admin only"
        path__: "Path: / (home only)"
    icon:
      label: Icon
      placeholder: "heroicons:home"
    parent:
      label: Parent
      placeholder: "— Root (no parent) —"

  import_menu_type:
    file:
      label: JSON file
      required: Please choose a file.
      mime_message: File must be JSON.
    strategy:
      label: When a menu with the same code and context already exists
      skip_existing: Skip (do not import)
      replace: Replace (delete existing items and import)

  copy_menu_type:
    code:
      label: Code
      placeholder: "e.g. sidebar_copy"
      regex_message: "Code must contain only letters, numbers, underscore and hyphen."
    name:
      label: Name
      placeholder: "e.g. Sidebar (copy)"
