# Form: MenuType
form:
  menu_type:
    code:
      label: Code
      help: "Unique identifier (letters, numbers, _ -). For base menus, code cannot be changed after creation."
      placeholder: "e.g. sidebar"
    base:
      label: "Base menu"
      help: "When checked, this menu's code cannot be changed after creation."
    name:
      label: Name
      placeholder: "e.g. Sidebar"
    context:
      label: Context
      help: "Optional JSON key-value pairs to identify this menu variant. When resolving by code, the first matching menu in the ordered context sets is used; empty = fallback for that code."
      placeholder: '{"partnerId": 1, "operatorId": 1}'
    icon:
      label: Icon
      help: "Optional icon identifier (e.g. Symfony UX Icons: heroicons:home, bootstrap:house)."
      placeholder: "e.g. heroicons:bars-3, bootstrap:list"
    permission_checker:
      label: Permission checker
      placeholder: "— Allow all —"
      allow_all: "— Allow all —"
      permission_key_aware: "— By permission key (structure) —"
      help: "Service implementing MenuPermissionCheckerInterface (empty = allow all)."
    depth_limit:
      label: Depth limit
      placeholder: "empty = unlimited"
      help: "Max depth to render (1 = root only, 2 = root + one level; empty = unlimited)."
    collapsible:
      label: "Collapsible (wrap menu in toggle block)"
    collapsible_expanded:
      label: "Collapsible expanded (open by default)"
    nested_collapsible:
      label: "Nested collapsible (items with children have toggle)"
    nested_collapsible_sections:
      label: "Collapsible sections"
      help: "Requires nested collapsible. When enabled, section rows show a chevron on the right and their links can be folded. When disabled, section children stay always expanded (no chevron)."
    class_menu:
      label: "Class menu (root <ul>)"
      placeholder: "e.g. nav flex-column"
    ul_id:
      label: "Ul id (root <ul>)"
      placeholder: "e.g. main-menu-navigation"
    class_item:
      label: "Class item (<li>)"
      placeholder: "e.g. nav-item"
    class_link:
      label: "Class link (<a>)"
      placeholder: "e.g. nav-link"
    class_children:
      label: "Class children (nested <ul>)"
      placeholder: "e.g. nav flex-column ms-2"
    class_section_children:
      label: "Class section children (<ul> under itemType \"section\")"
      placeholder: "e.g. nav flex-column list-unstyled ps-0 (flat; empty = same as children)"
      help: "When set, the first-level list under each section uses these classes instead of “Class children”, so links can align with the section title (no indent). Leave empty to keep using the nested children class."
    class_section_child_item:
      label: "Class <li> for direct children of itemType \"section\""
      placeholder: "e.g. nav-item ms-0 (empty = same as Class item)"
      help: "When set, links and dividers that are direct children of a section use this for the <li> class instead of “Class item”. Use for margin/padding tweaks under flat section lists."
    class_section_child_link:
      label: "Class <a> for direct children of itemType \"section\""
      placeholder: "e.g. d-flex align-items-center ps-0 (empty = same as Class link)"
      help: "When set, links that are direct children of a section use this for the <a> class instead of “Class link”. Pairs with section child <li> for alignment."
    class_section_label:
      label: "Class section label (itemType \"section\")"
      placeholder: "e.g. navigation-header"
    class_section:
      label: "Class section (<li> when itemType \"section\")"
      placeholder: "e.g. menu-section"
    class_divider:
      label: "Class divider (<li> when itemType \"divider\")"
      placeholder: "e.g. menu-divider"
    class_current:
      label: "Class current (link matching current route)"
      placeholder: "e.g. active"
    class_branch_expanded:
      label: "Class branch expanded (<li> when route in branch)"
      placeholder: "e.g. active-branch"
    class_has_children:
      label: "Class has children (<li> when item has children)"
      placeholder: "e.g. has-children"
    class_expanded:
      label: "Class expanded (<li> when children block is open)"
      placeholder: "e.g. is-expanded"
    class_collapsed:
      label: "Class collapsed (<li> when children block is closed)"
      placeholder: "e.g. is-collapsed"
    empty_choice: "— Empty —"
    css_section_heading: "CSS classes for rendering (override config when set)."
    section_definition: "Definition (code, base, name, context, icon)"
    section_config: "Configuration (permissions, depth, collapsible, CSS)"

  menu_item_type:
    section_basic: "Identity (labels)"
    section_icon: "Identity (type, position, icon)"
    section_config: "Configuration (link, permission)"
    label_required: "Label is required for Link and Section."
    label:
      label: Label
    label_locale: "Label (%locale%)"
    divider_label_hint: "Optional name for this divider (recommended for accessibility and the dashboard list). Leave empty if you only need a visual separator."
    type:
      label: Type
      link: Link
      section: Section
      divider: Divider
      service: Service (runtime URL)
    link_resolver:
      label: Link resolver
      placeholder: "— Select resolver —"
      help: "Choose a service that implements MenuLinkResolverInterface. It may return a single URL or a list of child link rows (label, href, position); the parent href is then \"#\"."
      service_id_placeholder: "e.g. App\\Menu\\MyLinkResolver"
      help_free_text: "Enter the service id (class name or container id) that implements MenuLinkResolverInterface."
      required: A link resolver is required for item type “Service”.
      route_params_hint: "Optional JSON passed to the resolver (for example route-like parameters)."
    position:
      label: Position
    link_type:
      label: Link type
      route: Route
      external_url: External URL
    route_name:
      label: Route name
      placeholder: "— Select route —"
    route_params:
      label: "Route params (JSON)"
      placeholder: "{}"
    external_url:
      label: External URL
      placeholder: "https://..."
    target_blank:
      label: Open in new tab
    permission_keys:
      label: Permission keys
      placeholder: "— Allow all —"
      help_csv: "Comma-separated keys (used when no configured choices are available)."
      choice:
        authenticated: "Authenticated only"
        admin: "Admin only"
        path__: "Path: / (home only)"
    is_unanimous:
      label: Require all selected keys
      help: "Enabled: all keys must pass (AND). Disabled: any key may pass (OR)."
    icon:
      label: Icon
      placeholder: "heroicons:home"
    parent:
      label: Parent
      placeholder: "— Root (no parent) —"
      help_inheritance: "Parent items sit above this one in the tree. Permission keys on this row apply to this item; your MenuPermissionChecker decides how parent/child rules combine. Sections and expandable links only render when at least one child is shown."
      circular_violation: "Circular parent hierarchy is not allowed."
      section_must_be_root: "Section items must stay at the root level (no parent)."
    section_collapsible:
      label: "Section children collapsible"
      inherit: "Use menu default"
      yes: "Yes (collapsible with chevron)"
      no: "No (always expanded)"
      help: "Overrides the menu option “Collapsible sections” for this section only. “Use menu default” follows the menu configuration."

  import_menu_type:
    file:
      label: JSON file
      required: Please choose a file.
      mime_message: File must be JSON.
    strategy:
      label: When a menu with the same code and context already exists
      skip_existing: Skip (do not import)
      replace: Replace (delete existing items and import)

  copy_menu_type:
    code:
      label: Code
      placeholder: "e.g. sidebar_copy"
      regex_message: "Code must contain only letters, numbers, underscore and hyphen."
    name:
      label: Name
      placeholder: "e.g. Sidebar (copy)"
